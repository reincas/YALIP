name: Publish YALIP to PyPI

on:
  release:
    types: [published] # Triggers when a GitHub Release is officially published

jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest

    # This section is CRITICAL for Trusted Publishing
    permissions:
      id-token: write  # Mandatory for OIDC dynamic credentials
      contents: read   # Standard permission to checkout code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build binary wheel and source tarball
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed here! The 'id-token: write' permission
        # handles the authentication via the Pending Publisher you set up.